<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <title>Urvashi Vankar - Full-Stack AI Developer</title>
    <meta name="description"
        content="Full-Stack AI Developer building production-ready AI applications from frontend to deployment." />

    <!-- Google Fonts Optimized -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        /* Fast inner HTML preloader before React mounts */
        #global-loader {
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #020617;
            /* bg-slate-950 */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.6s;
        }

        .loader-circle {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(14, 165, 233, 0.1);
            /* primary/10 */
            border-top-color: #0ea5e9;
            /* primary */
            border-right-color: #0ea5e9;
            border-radius: 50%;
            animation: spin 0.8s ease-in-out infinite;
        }

        .loader-text {
            font-family: 'Space Grotesk', sans-serif;
            color: #f1f5f9;
            font-size: 12px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 600;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 0.5;
            }

            50% {
                opacity: 1;
            }
        }

        /* Hide loader class */
        .loader-hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(1.05);
            /* Slight zoom out effect */
        }

        body {
            background-color: #020617;
            /* Prevent white flash */
        }
    </style>
</head>

<body>
    <!-- Preloader shown before React hydration -->
    <div id="global-loader">
        <div class="loader-circle"></div>
        <div class="loader-text">Initializing</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
        // Automatically hide the loader once window is fully loaded
        window.addEventListener('load', () => {
            const loader = document.getElementById('global-loader');
            if (loader) {
                // Add a tiny delay to ensure React has started rendering its first frame
                setTimeout(() => {
                    loader.classList.add('loader-hidden');
                    setTimeout(() => {
                        loader.remove(); // Clean up from DOM
                    }, 600);
                }, 400);
            }
        });
    </script>
</body>

</html>
